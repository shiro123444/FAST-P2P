services:
  relay:
    build:
      context: .
      dockerfile: deploy/Dockerfile.relay
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    depends_on:
      - relay
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped
