<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- 修复: 删除 user-scalable=no 允许用户缩放 -->
    <title>FAST P2P - 快速文件传输</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0d1117;
        color: #c9d1d9;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }
      h1 {
        color: #58a6ff;
        margin-bottom: 8px;
        font-size: 1.5em;
      }
      .subtitle {
        color: #8b949e;
        margin-bottom: 24px;
        font-size: 0.9em;
      }

      .panel {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 20px;
        width: 100%;
        max-width: 400px;
        margin-bottom: 16px;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #484f58;
      }
      .dot.online {
        background: #3fb950;
      }
      .dot.waiting {
        background: #d29922;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* 修复: 添加 prefers-reduced-motion 支持 */
      @media (prefers-reduced-motion: reduce) {
        .dot.waiting {
          animation: none;
        }
        .btn,
        .transfer-area {
          transition: none;
        }
      }

      .room-info {
        background: #0d1117;
        border-radius: 6px;
        padding: 12px;
        margin-bottom: 16px;
        text-align: center;
      }
      .room-code {
        font-size: 2em;
        font-weight: bold;
        color: #58a6ff;
        letter-spacing: 4px;
        font-family: monospace;
        word-break: break-all;
      }
      .room-hint {
        color: #8b949e;
        font-size: 0.8em;
        margin-top: 6px;
      }

      #qrcode {
        display: flex;
        justify-content: center;
        margin: 16px 0;
      }
      #qrcode canvas {
        border-radius: 4px;
      }

      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 1em;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 8px;
      }
      .btn-primary {
        background: #238636;
        color: white;
      }
      .btn-primary:hover {
        background: #2ea043;
      }
      .btn-secondary {
        background: #21262d;
        color: #c9d1d9;
        border: 1px solid #30363d;
      }
      .btn-secondary:hover {
        background: #30363d;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* 修复: 添加焦点状态样式 */
      .btn:focus-visible,
      input:focus-visible,
      .transfer-area:focus-visible,
      .scan-area:focus-visible {
        outline: 3px solid #58a6ff;
        outline-offset: 2px;
      }

      /* 修复: 添加 active 状态支持触摸设备 */
      .btn:active {
        transform: scale(0.98);
      }

      .transfer-area {
        border: 2px dashed #30363d;
        border-radius: 8px;
        padding: 32px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
      }
      .transfer-area:hover {
        border-color: #58a6ff;
      }
      .transfer-area.dragover {
        border-color: #58a6ff;
        background: rgba(88, 166, 255, 0.1);
      }
      .transfer-icon {
        font-size: 3em;
        margin-bottom: 8px;
      }
      .transfer-text {
        color: #8b949e;
      }
      #fileInput {
        display: none;
      }

      .progress-container {
        margin: 16px 0;
      }
      .progress-bar {
        height: 8px;
        background: #21262d;
        border-radius: 4px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: #58a6ff;
        transition: width 0.3s;
        width: 0%;
      }
      .progress-text {
        margin-top: 6px;
        font-size: 0.85em;
        color: #8b949e;
      }

      .file-list {
        margin-top: 16px;
      }
      .file-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        background: #0d1117;
        border-radius: 4px;
        margin-bottom: 4px;
      }
      .file-icon {
        font-size: 1.2em;
      }
      .file-name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .file-size {
        color: #8b949e;
        font-size: 0.85em;
      }
      .file-status {
        font-size: 0.85em;
      }
      .file-status.done {
        color: #3fb950;
      }
      .file-status.error {
        color: #f85149;
      }

      .logs {
        margin-top: 16px;
        max-height: 120px;
        overflow-y: auto;
      }
      .log-entry {
        font-size: 0.8em;
        color: #8b949e;
        padding: 2px 0;
        font-family: monospace;
      }

      .scan-area {
        border: 2px dashed #30363d;
        border-radius: 8px;
        padding: 16px;
        text-align: center;
        margin-bottom: 16px;
      }
      .scan-hint {
        color: #8b949e;
        font-size: 0.85em;
        margin-top: 8px;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <h1>FAST P2P</h1>
    <p class="subtitle" id="subtitle">快速安全的点对点文件传输</p>

    <!-- 连接状态 -->
    <div class="panel">
      <div class="status">
        <div class="dot" id="dot"></div>
        <span id="statusText">准备连接...</span>
      </div>
      <div id="roomInfo" class="room-info hidden">
        <div>房间码</div>
        <div class="room-code" id="roomCode"></div>
        <div class="room-hint" id="roomHint">发送给接收方扫码</div>
      </div>
      <div id="joinArea">
        <div class="scan-area" id="scanBtn" role="button" tabindex="0" aria-label="扫描二维码加入房间">
          <div style="font-size: 2em" aria-hidden="true">📷</div>
          <div>扫描二维码加入</div>
          <div class="scan-hint">或输入房间码</div>
        </div>
        <label for="manualCode" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;">输入房间码</label>
        <input
          type="text"
          id="manualCode"
          placeholder="输入房间码..."
          aria-label="房间码输入框"
          style="
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #c9d1d9;
            font-size: 1em;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
          "
        />
        <button class="btn btn-primary" id="joinBtn" style="margin-top: 8px" aria-label="加入房间">加入房间</button>
      </div>
      <button class="btn btn-secondary" id="createBtn" aria-label="创建新房间">创建新房间</button>
    </div>

    <!-- 文件发送区（发送方） -->
    <div class="panel hidden" id="sendPanel">
      <div class="transfer-area" id="dropZone" role="button" tabindex="0" aria-label="点击或拖拽文件到这里上传">
        <div class="transfer-icon" aria-hidden="true">📁</div>
        <div class="transfer-text">点击或拖拽文件到这里</div>
        <div class="transfer-text" style="font-size: 0.8em; margin-top: 4px">或点击选择文件</div>
      </div>
      <input type="file" id="fileInput" aria-label="文件选择器" />

      <div class="progress-container hidden" id="sendProgress">
        <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="发送进度">
          <div class="progress-fill" id="sendFill"></div>
        </div>
        <div class="progress-text" id="sendProgressText" aria-live="polite">0%</div>
      </div>

      <div class="file-list" id="sendFileList" role="list" aria-label="已发送文件列表"></div>
    </div>

    <!-- 文件接收区（接收方） -->
    <div class="panel hidden" id="recvPanel">
      <div style="text-align: center; padding: 20px">
        <div style="font-size: 3em" aria-hidden="true">📥</div>
        <div style="margin-top: 8px">等待接收文件...</div>
      </div>
      <div class="progress-container hidden" id="recvProgress">
        <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="接收进度">
          <div class="progress-fill" id="recvFill"></div>
        </div>
        <div class="progress-text" id="recvProgressText" aria-live="polite">0%</div>
      </div>
      <div class="file-list" id="recvFileList" role="list" aria-label="已接收文件列表"></div>
    </div>

    <div class="logs" id="logs" role="log" aria-live="polite" aria-label="操作日志"></div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script>
      // ========== 配置 ==========
      const RELAY_URL = location.protocol === 'https:' ? 'wss://' + location.host : 'ws://' + location.host
      const CHUNK_SIZE = 32 * 1024

      // ========== 加密 ==========
      async function deriveKey(code) {
        const encoder = new TextEncoder()
        const keyMaterial = await crypto.subtle.importKey(
          'raw', encoder.encode(code), 'PBKDF2', false, ['deriveBits']
        )
        const bits = await crypto.subtle.deriveBits(
          { name: 'PBKDF2', salt: encoder.encode('fastp2p-salt'), iterations: 100000, hash: 'SHA-256' },
          keyMaterial, 256
        )
        return new Uint8Array(bits)
      }

      async function encryptChunk(data, key) {
        const iv = crypto.getRandomValues(new Uint8Array(12))
        const encrypted = await crypto.subtle.encrypt(
          { name: 'AES-GCM', iv }, key, data
        )
        return {
          iv: btoa(String.fromCharCode(...iv)),
          data: btoa(String.fromCharCode(...new Uint8Array(encrypted))),
        }
      }

      async function decryptChunk(encryptedData, key) {
        const iv = new Uint8Array(atob(encryptedData.iv).split('').map(c => c.charCodeAt(0)))
        const data = new Uint8Array(atob(encryptedData.data).split('').map(c => c.charCodeAt(0)))
        const decrypted = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv }, key, data
        )
        return new Uint8Array(decrypted)
      }

      // ========== 状态 ==========
      let ws = null
      let room = null
      let peerId = null
      let peer = null
      let encryptionKey = null
      let isCreator = false
      let isConnected = false

      const pendingFile = { chunks: [], totalChunks: 0, received: 0, file: null, startTime: 0 }
      const sentFiles = []
      const receivedFiles = []

      // ========== DOM ==========
      const dot = document.getElementById('dot')
      const statusText = document.getElementById('statusText')
      const roomInfo = document.getElementById('roomInfo')
      const roomCodeEl = document.getElementById('roomCode')
      const roomHint = document.getElementById('roomHint')
      const joinArea = document.getElementById('joinArea')
      const createBtn = document.getElementById('createBtn')
      const joinBtn = document.getElementById('joinBtn')
      const manualCode = document.getElementById('manualCode')
      const scanBtn = document.getElementById('scanBtn')
      const sendPanel = document.getElementById('sendPanel')
      const recvPanel = document.getElementById('recvPanel')
      const dropZone = document.getElementById('dropZone')
      const fileInput = document.getElementById('fileInput')
      const sendProgress = document.getElementById('sendProgress')
      const sendFill = document.getElementById('sendFill')
      const sendProgressText = document.getElementById('sendProgressText')
      const recvProgress = document.getElementById('recvProgress')
      const recvFill = document.getElementById('recvFill')
      const recvProgressText = document.getElementById('recvProgressText')
      const logs = document.getElementById('logs')

      // ========== 日志 ==========
      function log(msg) {
        const time = new Date().toLocaleTimeString('en-US', { hour12: false })
        const entry = document.createElement('div')
        entry.className = 'log-entry'
        entry.textContent = `${time} ${msg}`
        logs.prepend(entry)
      }

      // ========== UI 更新 ==========
      function setStatus(text, state = 'waiting') {
        statusText.textContent = text
        dot.className = 'dot ' + state
      }

      function showRoom(code, hint) {
        roomCodeEl.textContent = code
        roomHint.textContent = hint || '发送给接收方扫码'
        roomInfo.classList.remove('hidden')
        joinArea.classList.add('hidden')
      }

      function showSend() {
        sendPanel.classList.remove('hidden')
        recvPanel.classList.add('hidden')
      }

      function showRecv() {
        sendPanel.classList.add('hidden')
        recvPanel.classList.remove('hidden')
      }

      // ========== QR 码 ==========
      function showQR(text) {
        const qrDiv = document.getElementById('qrcode') || (() => {
          const d = document.createElement('div')
          d.id = 'qrcode'
          roomInfo.appendChild(d)
          return d
        })()
        qrDiv.innerHTML = ''
        QRCode.toCanvas(document.createElement('canvas'), text, { width: 200 }, (err, canvas) => {
          if (!err) qrDiv.appendChild(canvas)
        })
      }

      // ========== WebSocket ==========
      function connect() {
        ws = new WebSocket(RELAY_URL)

        ws.onopen = () => {
          isConnected = true
          log('已连接到服务器')
          if (room && peerId) {
            ws.send(JSON.stringify({ type: 'join', room }))
          }
        }

        ws.onclose = () => {
          isConnected = false
          log('连接断开')
          setTimeout(connect, 2000)
        }

        ws.onerror = (e) => log('连接错误')

        ws.onmessage = async (event) => {
          let msg
          try { msg = JSON.parse(event.data) } catch { return }

          switch (msg.type) {
            case 'created':
              room = msg.room
              peerId = msg.peerId
              isCreator = true
              showRoom(room, '发送给接收方扫码')
              showQR(room + '|' + room)
              showSend()
              setStatus('等待接收方加入', 'waiting')
              break

            case 'joined':
              room = msg.room
              peerId = msg.peerId
              isCreator = false
              peer = null
              showRoom(room, '已加入房间，等待文件...')
              showRecv()
              setStatus('已连接，等待发送', 'online')
              break

            case 'peer_joined':
              peer = msg.peerId
              log(`对等方 ${peer} 已加入`)
              setStatus('对等方已连接', 'online')
              showSend()
              showQR(null)
              break

            case 'peer_leave':
              peer = null
              log('对等方已离开')
              setStatus('对等方已离开', 'waiting')
              showRecv()
              break

            case 'relay':
              if (!encryptionKey) return
              try {
                const chunk = await decryptChunk(msg.data, encryptionKey)
                if (!pendingFile.file && msg.data._meta) {
                  // 新文件开始
                  pendingFile.file = {
                    name: msg.data._meta.name,
                    size: msg.data._meta.size,
                    id: msg.data._meta.id,
                  }
                  pendingFile.totalChunks = msg.data._meta.total
                  pendingFile.received = 0
                  pendingFile.startTime = Date.now()
                  pendingFile.chunks = []
                }
                pendingFile.chunks[msg.data.index] = chunk
                pendingFile.received++
                const pct = Math.round(pendingFile.received / pendingFile.totalChunks * 100)
                recvFill.style.width = pct + '%'
                recvProgressText.textContent = `${pct}% - ${pendingFile.file.name}`
                recvProgress.classList.remove('hidden')
                // 修复: 更新进度条 aria 属性
                const recvBar = recvProgress.querySelector('.progress-bar')
                if (recvBar) recvBar.setAttribute('aria-valuenow', pct)
                if (pendingFile.received === pendingFile.totalChunks) {
                  const blob = new Blob(pendingFile.chunks)
                  const url = URL.createObjectURL(blob)
                  const a = document.createElement('a')
                  a.href = url
                  a.download = pendingFile.file.name
                  a.click()
                  URL.revokeObjectURL(url)
                  log(`收到文件: ${pendingFile.file.name}`)
                  addRecvFile(pendingFile.file.name, pendingFile.file.size, 'done')
                  pendingFile.file = null
                  recvProgress.classList.add('hidden')
                }
              } catch (e) {
                log('解密错误: ' + e.message)
              }
              break

            case 'done':
              log('文件传输完成')
              break

            case 'error':
              log('错误: ' + msg.message)
              break
          }
        }
      }

      // ========== 文件发送 ==========
      async function sendFile(file) {
        if (!peer) {
          log('等待对等方连接...')
          return
        }
        if (!encryptionKey) {
          log('无加密密钥')
          return
        }

        const id = Math.random().toString(36).slice(2, 10)
        const totalChunks = Math.ceil(file.size / CHUNK_SIZE)
        let sent = 0
        const startTime = Date.now()

        addSendFile(file.name, file.size, 'transferring')
        sendProgress.classList.remove('hidden')

        const buffer = await file.arrayBuffer()
        let offset = 0
        let index = 0

        while (offset < buffer.byteLength) {
          const chunk = buffer.slice(offset, offset + CHUNK_SIZE)
          const encrypted = await encryptChunk(chunk, encryptionKey)
          ws.send(JSON.stringify({
            type: 'relay',
            data: {
              ...encrypted,
              index,
              total: totalChunks,
              _meta: index === 0 ? { name: file.name, size: file.size, id, total: totalChunks } : null,
            },
          }))
          offset += chunk.byteLength
          sent++
          index++
          const pct = Math.round(sent / totalChunks * 100)
          sendFill.style.width = pct + '%'
          sendProgressText.textContent = `${pct}% - ${file.name}`
          // 修复: 更新进度条 aria 属性
          const sendBar = sendProgress.querySelector('.progress-bar')
          if (sendBar) sendBar.setAttribute('aria-valuenow', pct)
          await new Promise(r => setTimeout(r, 5)) // 防止发送过快
        }

        ws.send(JSON.stringify({ type: 'done', hash: '' }))
        addSendFile(file.name, file.size, 'done')
        sendProgress.classList.add('hidden')
        log(`已发送: ${file.name}`)
      }

      // ========== 文件列表 ==========
      function addSendFile(name, size, status) {
        sentFiles.unshift({ name, size, status })
        renderSendList()
      }

      function addRecvFile(name, size, status) {
        receivedFiles.unshift({ name, size, status })
        renderRecvList()
      }

      function renderSendList() {
        const el = document.getElementById('sendFileList')
        el.innerHTML = sentFiles.map(f => `
          <div class="file-item">
            <span class="file-icon">📤</span>
            <span class="file-name">${f.name}</span>
            <span class="file-size">${formatSize(f.size)}</span>
            <span class="file-status ${f.status}">${f.status === 'done' ? '✓' : f.status === 'error' ? '✗' : '...'}</span>
          </div>
        `).join('')
      }

      function renderRecvList() {
        const el = document.getElementById('recvFileList')
        el.innerHTML = receivedFiles.map(f => `
          <div class="file-item">
            <span class="file-icon">📥</span>
            <span class="file-name">${f.name}</span>
            <span class="file-size">${formatSize(f.size)}</span>
            <span class="file-status ${f.status}">${f.status === 'done' ? '✓' : f.status === 'error' ? '✗' : '...'}</span>
          </div>
        `).join('')
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + 'B'
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB'
        if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + 'MB'
        return (bytes / 1024 / 1024 / 1024).toFixed(1) + 'GB'
      }

      // ========== 事件 ==========
      createBtn.onclick = () => {
        if (!isConnected) { log('未连接到服务器'); return }
        ws.send(JSON.stringify({ type: 'create' }))
        log('正在创建房间...')
        createBtn.disabled = true
      }

      joinBtn.onclick = () => {
        const code = manualCode.value.trim().toUpperCase()
        if (!code) { log('请输入房间码'); return }
        room = code
        encryptionKey = await deriveKey(code)
        if (isConnected) {
          ws.send(JSON.stringify({ type: 'join', room }))
          log('正在加入房间: ' + room)
        }
        joinBtn.disabled = true
      }

      dropZone.onclick = () => fileInput.click()

      // 修复: 添加键盘支持
      dropZone.onkeydown = (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault()
          fileInput.click()
        }
      }

      dropZone.ondragover = (e) => {
        e.preventDefault()
        dropZone.classList.add('dragover')
      }

      dropZone.ondragleave = () => dropZone.classList.remove('dragover')

      dropZone.ondrop = (e) => {
        e.preventDefault()
        dropZone.classList.remove('dragover')
        const file = e.dataTransfer.files[0]
        if (file) sendFile(file)
      }

      fileInput.onchange = () => {
        const file = fileInput.files[0]
        if (file) sendFile(file)
      }

      // 修复: 添加扫描按钮键盘支持
      scanBtn.onkeydown = (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault()
          // 这里可以添加扫描二维码的逻辑
          manualCode.focus()
        }
      }

      // 扫码唤起处理（通过 URL 参数）
      const params = new URLSearchParams(location.search)
      const initCode = params.get('code')
      if (initCode) {
        room = initCode.toUpperCase()
        manualCode.value = room
        encryptionKey = deriveKey(initCode)
        connect()
        joinBtn.click()
      }

      // 启动
      connect()
    </script>
  </body>
</html>
